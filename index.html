<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#08172d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>FLIP — Combat Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameWrap">
    <canvas id="game" aria-label="FLIP game"></canvas>

    <div id="hud">
      <div id="brand">
        <div id="title">FLIP</div>
        <div id="mission">ДОБЕРИСЬ ДО ПОРТАЛА</div>
      </div>
      <div id="stats">
        <span id="hearts">♥♥♥</span>
        <span id="enemies">⚡ 0/5</span>
        <span id="crystals">◆ 0/7</span>
        <span id="time">0.0</span>
      </div>
    </div>

    <div id="message" class="show">
      <div class="panel">
        <div class="eyebrow">МОБИЛЬНЫЙ ПРОТОТИП v0.2</div>
        <h1>FLIP</h1>
        <p>Два мира. Одна гравитация. Теперь — с боем.</p>
        <p class="small">
          Движение: стрелки или A/D. Прыжок: Space. Переворот: F/Shift.<br>
          Выстрел: X, K или кнопка ⚡. Уничтожай теневых существ и собирай кристаллы.
        </p>
        <button id="startBtn">НАЧАТЬ</button>
      </div>
    </div>

    <div id="touch">
      <div class="leftCluster">
        <button id="leftBtn" aria-label="Влево">◀</button>
        <button id="rightBtn" aria-label="Вправо">▶</button>
      </div>
      <div class="rightCluster">
        <button id="jumpBtn" class="actionButton" aria-label="Прыжок">▲</button>
        <button id="shootBtn" class="actionButton shoot" aria-label="Выстрел">⚡</button>
        <button id="flipBtn" class="flip" aria-label="Перевернуть гравитацию">FLIP</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
