<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#070319"><title>FLIP — Moon Forest</title><link rel="stylesheet" href="style.css"></head>
<body><div id="gameWrap"><canvas id="game" aria-label="FLIP game"></canvas>
<div id="hud"><div class="brand"><div class="logo">FLIP</div><div class="chapter">MOON FOREST</div></div><div class="hudRight"><div class="stats"><span id="hearts">♥♥♥</span><span id="enemies">☠ 0/7</span><span id="crystals">◆ 0/9</span><span id="time">0.0</span></div><button id="pauseBtn" class="iconBtn" aria-label="Меню">☰</button></div></div>
<div id="message" class="show"><div class="panel"><div class="catBadge">🐈‍⬛</div><h1>FLIP</h1><p id="menuLead" class="lead">Лунный лес ждёт</p><p id="menuDesc" class="small">Переворачивай гравитацию, собирай кристаллы и отбивайся от роботов.</p><div class="settings"><div class="settingRow languageRow"><span data-text="language">Язык</span><div class="segmented"><button class="miniBtn active" data-lang="ru">РУС</button><button class="miniBtn" data-lang="en">ENG</button></div></div><label class="settingRow"><span data-text="music">Музыка</span><input data-volume="music" type="range" min="0" max="100" value="24"><output data-value="music">24%</output></label><label class="settingRow"><span data-text="sfx">Звуки игры</span><input data-volume="sfx" type="range" min="0" max="100" value="95"><output data-value="sfx">95%</output></label></div><button id="startBtn">НАЧАТЬ</button></div></div>
<div id="pauseMenu"><div class="panel"><div class="pauseIcon">☰</div><h2 id="pauseTitle">ПАУЗА</h2><div class="settings"><div class="settingRow languageRow"><span data-text="language">Язык</span><div class="segmented"><button class="miniBtn active" data-lang="ru">РУС</button><button class="miniBtn" data-lang="en">ENG</button></div></div><label class="settingRow"><span data-text="music">Музыка</span><input data-volume="music" type="range" min="0" max="100" value="24"><output data-value="music">24%</output></label><label class="settingRow"><span data-text="sfx">Звуки игры</span><input data-volume="sfx" type="range" min="0" max="100" value="95"><output data-value="sfx">95%</output></label></div><button id="resumeBtn">ПРОДОЛЖИТЬ</button><button id="restartBtn" class="secondaryBtn">НАЧАТЬ ЗАНОВО</button></div></div>
<div id="touch"><div class="movePad"><button id="leftBtn" aria-label="Влево">◀</button><button id="rightBtn" aria-label="Вправо">▶</button></div><div class="actionPad"><button id="flipBtn" aria-label="Переворот">FLIP</button><button id="shootBtn" aria-label="Выстрел">🧶</button></div></div></div><script src="game.js"></script></body></html>
